<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0d1117"/>

  <!-- Grid lines -->
  <line x1="0" y1="157" x2="1200" y2="157" stroke="#21262d" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#21262d" stroke-width="1"/>
  <line x1="0" y1="473" x2="1200" y2="473" stroke="#21262d" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#21262d" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#21262d" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#21262d" stroke-width="1"/>

  <!-- Glow effects -->
  <circle cx="180" cy="315" r="120" fill="#39d0d8" opacity="0.04"/>
  <circle cx="1020" cy="315" r="120" fill="#f5a623" opacity="0.04"/>
  <circle cx="600" cy="200" r="80" fill="#f85149" opacity="0.03"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#topGradient)"/>
  <defs>
    <linearGradient id="topGradient" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#39d0d8"/>
      <stop offset="50%" stop-color="#f85149"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
  </defs>

  <!-- Status dots -->
  <circle cx="560" cy="140" r="4" fill="#39d0d8"/>
  <circle cx="580" cy="140" r="4" fill="#f5a623"/>
  <circle cx="600" cy="140" r="4" fill="#f85149"/>

  <!-- LGAT label -->
  <text x="600" y="195" text-anchor="middle" fill="#39d0d8" font-family="monospace" font-size="16" font-weight="600" letter-spacing="4">LGAT</text>

  <!-- Title -->
  <text x="600" y="260" text-anchor="middle" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="600" letter-spacing="-1">Lunar Governance</text>
  <text x="600" y="315" text-anchor="middle" fill="#e6edf3" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="600" letter-spacing="-1">Authority Tracker</text>

  <!-- Subtitle -->
  <text x="600" y="365" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="16" letter-spacing="0.5">A forensic analysis of how universalist language allocates</text>
  <text x="600" y="388" text-anchor="middle" fill="#8b949e" font-family="Inter, system-ui, sans-serif" font-size="16" letter-spacing="0.5">institutional authority in cislunar space</text>

  <!-- Bottom stats bar background -->
  <rect x="0" y="440" width="1200" height="1" fill="#21262d"/>

  <!-- Artemis label -->
  <circle cx="230" cy="490" r="5" fill="#39d0d8"/>
  <text x="245" y="495" fill="#39d0d8" font-family="monospace" font-size="12" font-weight="500" letter-spacing="1">ARTEMIS 43+</text>

  <!-- Discretion Points -->
  <circle cx="530" cy="490" r="5" fill="#f85149"/>
  <text x="545" y="495" fill="#f85149" font-family="monospace" font-size="12" font-weight="500" letter-spacing="1">17 DISCRETION POINTS</text>

  <!-- ILRS label -->
  <circle cx="870" cy="490" r="5" fill="#f5a623"/>
  <text x="885" y="495" fill="#f5a623" font-family="monospace" font-size="12" font-weight="500" letter-spacing="1">ILRS 12+</text>

  <!-- Bottom bar -->
  <rect x="0" y="540" width="1200" height="1" fill="#21262d"/>

  <!-- Faultline + Author -->
  <text x="180" y="580" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11" letter-spacing="1">FAULTLINE RESEARCH PLATFORM</text>
  <text x="600" y="580" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11" letter-spacing="1">BEETHAM-KOYANAGI LEGITIMATION TRIAD</text>
  <text x="1020" y="580" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11" letter-spacing="1">RISA KOYANAGI</text>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#topGradient)"/>
</svg>
